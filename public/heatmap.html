<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>히트맵</title>
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 :root { --bg: #ffffff; --bg2: #f7f7f5; --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0; }
 @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --bg2: #242424; --text: #f0f0f0; --text2: #a0a0a0; --text3: #666; } }
 body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); padding: 16px; }
 .card { background: var(--bg2); border-radius: 10px; padding: 16px; }
 .title { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
 .desc { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
 table { width: 100%; border-collapse: separate; border-spacing: 4px; table-layout: fixed; }
 col.label-col { width: 90px; }
 th { font-size: 11px; font-weight: 500; color: var(--text2); text-align: center; padding: 4px; }
 th.row-header { text-align: left; }
 td { border-radius: 6px; height: 44px; text-align: center; font-size: 13px; font-weight: 600; cursor: default; position: relative; }
 td.row-label { font-size: 11px; font-weight: 400; color: var(--text2); text-align: left; background: transparent !important; height: auto; padding-right: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 .legend { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; color: var(--text3); }
 .legend-bar { display: flex; gap: 2px; }
 .legend-bar span { width: 18px; height: 10px; border-radius: 2px; display: inline-block; }
 .statusbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
 .statusbar-time { font-size: 11px; color: var(--text3); }
 .statusbar-auto { font-size: 10px; color: var(--text3); }
 .btn-refresh { font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer; background: var(--bg); border: 0.5px solid rgba(0,0,0,0.15); color: var(--text2); }
 @media (prefers-color-scheme: dark) { .btn-refresh { border-color: rgba(255,255,255,0.15); } }
 /* 툴팁 */
 .tooltip {
  display: none;
  position: fixed;
  background: rgba(30,30,30,0.92);
  color: #fff;
  font-size: 11px;
  padding: 8px 10px;
  border-radius: 8px;
  z-index: 9999;
  max-width: 200px;
  pointer-events: none;
  line-height: 1.6;
  white-space: pre-line;
 }
</style>
</head>
<body>
<div class="statusbar">
 <span class="statusbar-time" id="updated">—</span>
 <span class="statusbar-auto">· 5분마다 자동 갱신</span>
 <button class="btn-refresh" onclick="load()">지금 갱신</button>
</div>
<div class="card">
 <div class="title">카테고리 × 성숙도 히트맵</div>
 <div class="desc">셀에 마우스 올리면 최근 아이디어 최대 10개 확인.</div>
 <div id="heatmap"></div>
 <div class="legend">
  <span>적음</span>
  <div class="legend-bar"><span style="background:rgba(29,158,117,0.1)"></span><span style="background:rgba(29,158,117,0.3)"></span><span style="background:rgba(29,158,117,0.5)"></span><span style="background:rgba(29,158,117,0.7)"></span><span style="background:rgba(29,158,117,0.9)"></span></div>
  <span>많음</span>
 </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>
const CATS = ["마케팅/그로스","운영/프로세스","제품/서비스","고객/시장","수익모델","기술/도구","기타 인사이트"];
let allIdeas = [];

function getMatEmoji(m) {
 if (m.includes('씨앗')) return '🌱';
 if (m.includes('싹')) return '🌿';
 if (m.includes('나무')) return '🌳';
 return '';
}

function showTooltip(e, ideas) {
 const tooltip = document.getElementById('tooltip');
 if (ideas.length === 0) { tooltip.style.display = 'none'; return; }
 const sorted = [...ideas].sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0)).slice(0,10);
 tooltip.textContent = sorted.map(i => '· ' + i.name).join('
');
 tooltip.style.display = 'block';
 positionTooltip(e);
}

function positionTooltip(e) {
 const tooltip = document.getElementById('tooltip');
 const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
 let x = e.clientX + 12, y = e.clientY + 12;
 if (x + tw > window.innerWidth - 8) x = e.clientX - tw - 12;
 if (y + th > window.innerHeight - 8) y = e.clientY - th - 12;
 tooltip.style.left = x + 'px';
 tooltip.style.top = y + 'px';
}

function hideTooltip() {
 document.getElementById('tooltip').style.display = 'none';
}

function renderHeatmap(ideas) {
 // 성숙도 동적 추출 — 데이터에 있는 값 기준
 const matSet = new Set();
 ideas.forEach(i => { if (i.maturity) matSet.add(i.maturity); });
 const MATS = ["씨앗","싹","나무"].filter(m => [...matSet].some(s => s.includes(m)));
 // 데이터에 없는 성숙도도 있을 수 있으니 추가
 [...matSet].forEach(s => { if (!MATS.some(m => s.includes(m))) MATS.push(s); });

 const activeCats = CATS.filter(c => ideas.some(i => i.category.includes(c.split('/')[0])));
 const maxVal = Math.max(...activeCats.flatMap(c =>
  MATS.map(m => ideas.filter(i => i.category.includes(c.split('/')[0]) && i.maturity.includes(m)).length)
 ), 1);

 let html = `<table><colgroup><col class="label-col">${MATS.map(()=>'<col>').join('')}</colgroup>`;
 html += '<thead><tr><th class="row-header"></th>';
 MATS.forEach(m => { html += `<th>${getMatEmoji(m)} ${m}</th>`; });
 html += '</tr></thead><tbody>';

 activeCats.forEach(cat => {
  const short = cat.length > 8 ? cat.slice(0,8)+'…' : cat;
  html += `<tr><td class="row-label" title="${cat}">${short}</td>`;
  MATS.forEach(mat => {
   const matched = ideas.filter(i => i.category.includes(cat.split('/')[0]) && i.maturity.includes(mat));
   const count = matched.length;
   const alpha = count === 0 ? 0 : 0.15 + (count / maxVal) * 0.80;
   const bg = count === 0 ? 'rgba(128,128,128,0.06)' : `rgba(29,158,117,${alpha.toFixed(2)})`;
   const color = alpha > 0.55 ? '#fff' : (count > 0 ? '#0a4433' : 'rgba(128,128,128,0.25)');
   const dataIdx = JSON.stringify(matched.map(i=>({name:i.name,createdAt:i.createdAt||''})));
   html += `<td style="background:${bg};color:${color};" data-ideas='${dataIdx.replace(/'/g,"&apos;")}'>${count > 0 ? count : ''}</td>`;
  });
  html += '</tr>';
 });
 html += '</tbody></table>';
 document.getElementById('heatmap').innerHTML = html;

 // 이벤트 등록
 document.querySelectorAll('#heatmap td:not(.row-label)').forEach(td => {
  td.addEventListener('mouseenter', e => {
   try {
    const ideas = JSON.parse(td.dataset.ideas.replace(/&apos;/g,"'"));
    showTooltip(e, ideas);
   } catch {}
  });
  td.addEventListener('mousemove', positionTooltip);
  td.addEventListener('mouseleave', hideTooltip);
 });
}

async function load() {
 try {
  const res = await fetch('/.netlify/functions/notion-data');
  const { ideas, updatedAt } = await res.json();
  allIdeas = ideas;
  const t = new Date(updatedAt);
  document.getElementById('updated').textContent = t.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + ' 업데이트';
  renderHeatmap(ideas);
 } catch(e) {
  document.getElementById('updated').textContent = '오류: ' + e.message;
 }
}
load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
