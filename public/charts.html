<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 :root { --bg: #ffffff; --bg2: #f7f7f5; --text2: #6b6b6b; --text3: #a0a0a0; }
 @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --bg2: #242424; --text2: #a0a0a0; --text3: #666; } }
 body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); padding: 16px; }
 .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
 .card { background: var(--bg2); border-radius: 10px; padding: 16px; }
 .title { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 14px; }
 .legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
 .legend span { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
 .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
 .statusbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
 .statusbar-time { font-size: 11px; color: var(--text3); }
 .statusbar-auto { font-size: 10px; color: var(--text3); }
 .btn-refresh { font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer; background: var(--bg); border: 0.5px solid rgba(0,0,0,0.15); color: var(--text2); }
 @media (prefers-color-scheme: dark) { .btn-refresh { border-color: rgba(255,255,255,0.15); } }
</style>
</head>
<body>
<div class="statusbar">
 <span class="statusbar-time" id="updated">—</span>
 <span class="statusbar-auto">· 5분마다 자동 갱신</span>
 <button class="btn-refresh" onclick="load()">지금 갱신</button>
</div>
<div class="grid">
 <div class="card">
  <div class="title">카테고리별 분포</div>
  <div style="position:relative;height:180px;"><canvas id="catChart"></canvas></div>
 </div>
 <div class="card">
  <div class="title">성숙도 분포</div>
  <div style="position:relative;height:180px;"><canvas id="matChart"></canvas></div>
  <div class="legend" id="matLegend"></div>
 </div>
</div>
<script>
var CAT_COLORS = ['#378add','#1d9e75','#e24b4a','#ef9f27','#a78bfa','#f472b6','#94a3b8','#fb923c','#34d399','#f87171'];
var MAT_COLORS = ['#1d9e75','#378add','#ef9f27','#e24b4a','#a78bfa','#f472b6','#94a3b8','#fb923c'];

// 이모지+텍스트 또는 순수 텍스트에서 핵심 레이블 추출
function cleanLabel(v) {
 if (!v || v === '미설정') return null;
 // 이모지 제거 후 앞뒤 공백 제거
 return v.replace(/[🌀-🿿]|[☀-⟿]|[🀀-🀯]|️/gu, '').trim();
}

var catInst = null, matInst = null;

async function load() {
 try {
  var res = await fetch('https://notion-proxy.duninurifamily.workers.dev/');
  var data = await res.json();
  var ideas = data.ideas;
  var t = new Date(data.updatedAt);
  document.getElementById('updated').textContent = t.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 업데이트';

  // 카테고리 동적 추출
  var catMap = {};
  ideas.forEach(function(i) {
   var label = cleanLabel(i.category);
   if (!label) return;
   catMap[label] = (catMap[label]||0)+1;
  });
  var catLabels = Object.keys(catMap);
  var catCounts = catLabels.map(function(k){ return catMap[k]; });

  // 성숙도 동적 추출
  var matMap = {};
  ideas.forEach(function(i) {
   var label = cleanLabel(i.maturity);
   if (!label) return;
   matMap[label] = (matMap[label]||0)+1;
  });
  var matLabels = Object.keys(matMap);
  var matCounts = matLabels.map(function(k){ return matMap[k]; });

  // 카테고리 차트
  if (catInst) catInst.destroy();
  catInst = new Chart(document.getElementById('catChart'), {
   type: 'bar',
   data: { labels: catLabels, datasets: [{ data: catCounts, backgroundColor: CAT_COLORS.slice(0, catLabels.length), borderRadius: 4, borderSkipped: false }] },
   options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 }, color: '#888' }, grid: { color: 'rgba(128,128,128,0.1)' } }, x: { ticks: { font: { size: 10 }, color: '#888', maxRotation: 30 }, grid: { display: false } } } }
  });

  // 성숙도 도넛 차트
  if (matInst) matInst.destroy();
  matInst = new Chart(document.getElementById('matChart'), {
   type: 'doughnut',
   data: { labels: matLabels, datasets: [{ data: matCounts, backgroundColor: MAT_COLORS.slice(0, matLabels.length), borderWidth: 0, hoverOffset: 6 }] },
   options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx){ return ' '+ctx.label+': '+ctx.raw+'개'; } } } } }
  });

  document.getElementById('matLegend').innerHTML = matLabels.map(function(l,i){
   return '<span><span class="dot" style="background:'+MAT_COLORS[i]+'"></span>'+l+' '+matCounts[i]+'개</span>';
  }).join('');

 } catch(e) {
  document.getElementById('updated').textContent = '오류: '+e.message;
 }
}
load();
setInterval(load, 5*60*1000);
</script>
</body>
</html>
