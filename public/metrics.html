<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현황 카드</title>
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 :root { --bg: #ffffff; --bg2: #f7f7f5; --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0; }
 @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --bg2: #242424; --text: #f0f0f0; --text2: #a0a0a0; --text3: #666; } }
 body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); padding: 16px; }
 .statusbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
 .statusbar-time { font-size: 11px; color: var(--text3); }
 .statusbar-auto { font-size: 10px; color: var(--text3); }
 .btn-refresh { font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer; background: var(--bg2); border: 0.5px solid rgba(0,0,0,0.15); color: var(--text2); }
 @media (prefers-color-scheme: dark) { .btn-refresh { border-color: rgba(255,255,255,0.15); background: var(--bg2); } }
 .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
 .card { background: var(--bg2); border-radius: 10px; padding: 16px; }
 .label { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
 .value { font-size: 32px; font-weight: 600; color: var(--text); }
 .sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
</style>
</head>
<body>
<div class="statusbar">
 <span class="statusbar-time" id="updated">—</span>
 <span class="statusbar-auto">· 5분마다 자동 갱신</span>
 <button class="btn-refresh" onclick="load()">지금 갱신</button>
</div>
<div class="grid">
 <div class="card"><div class="label">전체 아이디어</div><div class="value" id="total">—</div><div class="sub">등록된 아이디어</div></div>
 <div class="card"><div class="label">🌱 씨앗</div><div class="value" id="seed">—</div><div class="sub">발굴 단계</div></div>
 <div class="card"><div class="label">🌿 싹</div><div class="value" id="sprout">—</div><div class="sub">구체화 중</div></div>
 <div class="card"><div class="label">🌳 나무</div><div class="value" id="tree">—</div><div class="sub">사업화 검토</div></div>
</div>
<script>
async function load() {
 try {
  const res = await fetch('https://notion-proxy.duninurifamily.workers.dev/');
  const { ideas, updatedAt } = await res.json();
  document.getElementById('total').textContent = ideas.length;
  document.getElementById('seed').textContent = ideas.filter(i => i.maturity.includes('씨앗')).length;
  document.getElementById('sprout').textContent = ideas.filter(i => i.maturity.includes('싹')).length;
  document.getElementById('tree').textContent = ideas.filter(i => i.maturity.includes('나무')).length;
  const t = new Date(updatedAt);
  document.getElementById('updated').textContent = t.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + ' 업데이트';
 } catch(e) {
  document.getElementById('updated').textContent = '오류: ' + e.message;
 }
}
load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
